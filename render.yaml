services:
  - type: web
    name: auction-backend
    env: node
    buildCommand: |
      npm install && 
      npx prisma generate && 
      node ensure-users.js && 
      npx prisma migrate resolve --applied 20240101000000_init || true && 
      npx prisma migrate resolve --applied 20250101000000_add_group_metadata || true && 
      npx prisma migrate resolve --rolled-back 20250201000000_add_created_by || true && 
      npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://auction-diredawa.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_FILE_SIZE
        value: 50MB
      - key: DATABASE_URL
        fromDatabase:
          name: auction-db
          property: connectionString
